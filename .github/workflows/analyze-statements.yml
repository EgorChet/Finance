name: Sync statements from xlsx

on:
  workflow_dispatch:
  push:
    paths:
      - "statements/*.xlsx"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install openpyxl deep-translator
      - name: Sync xlsx files
        run: python cli.py --sync
      - name: Commit updated statements
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/statements.json || true
          git diff --staged --quiet || git commit -m "chore: sync statements from xlsx"
          git push || true
