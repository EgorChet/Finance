name: Deploy Vue to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel superseded runs before they reach Pages — avoids "Deployment cancelled" when
# several pushes land close together (with cancel-in-progress: false, GitHub Pages
# cancels in-flight deploys instead, leaving red runs and no live update).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          npm install
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
