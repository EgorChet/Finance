services:
  analyzer:
    build:
      context: .
      dockerfile: analyzer_api/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      ANALYZER_URL: http://analyzer:8001
      DATA_DIR: /app/data
      STORAGE: local
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_SECRET: ${AUTH_SECRET:-local-dev-secret}
    volumes:
      - ./data:/app/data
      - ./statements:/app/statements
    depends_on:
      - analyzer

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "5173:80"
    depends_on:
      - api
