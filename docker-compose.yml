services:
  analyzer:
    build:
      context: .
      dockerfile: analyzer_api/Dockerfile
    ports:
      - "8001:8001"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      ANALYZER_URL: http://analyzer:8001
      DATA_DIR: /app/data
      CAL_SYNC_ENABLED: ${CAL_SYNC_ENABLED:-true}
      STORAGE: ${STORAGE:-local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_SECRET: ${AUTH_SECRET:-local-dev-secret}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - ./statements:/app/statements
      - ./data:/app/data
    depends_on:
      - analyzer

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - api
