services:
  - type: web
    name: finance-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANALYZER_URL
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_LABELS
        sync: false
      - key: AUTH_LABEL_EGOR
        sync: false
      - key: AUTH_LABEL_JULIA
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: STORAGE
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CAL_SYNC_ENABLED
        value: "true"
      - key: CAL_SESSION_ENCRYPTION_KEY
        generateValue: true

  - type: web
    name: finance-analyzer
    runtime: docker
    dockerfilePath: ./analyzer/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
